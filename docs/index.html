<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>软件工程刷题系统</title>
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xelho359fs");
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-panel hidden" id="authPanel"></section>

      <section class="workspace hidden" id="workspace">
        <div class="gate-panel hidden" id="gatePanel">
          <div class="brand-block">
            <p class="eyebrow">Quiz Studio</p>
            <h1>软件工程刷题系统</h1>
            <p class="subtle">GitHub Pages 静态版，错题集和筛选偏好保存在当前浏览器中。</p>
          </div>

          <form class="auth-card gate-card" id="gateForm">
            <p class="eyebrow">Access Key</p>
            <h2>输入启动口令</h2>
            <p class="subtle">每次打开网页都需要输入启动口令后，才能进入题库和错题集。</p>
            <label>
              启动口令
              <input id="gatePassword" type="text" autocomplete="off" placeholder="输入启动口令" />
            </label>
            <button class="primary-button" type="submit">进入软件</button>
            <p class="form-message" id="gateMessage"></p>
          </form>
        </div>

        <div class="main-panel hidden" id="mainPanel">
          <header class="topbar">
            <div>
              <p class="eyebrow">Software Engineering</p>
              <h1>刷题台</h1>
            </div>
            <div class="user-area">
              <span id="userLabel"></span>
              <button class="ghost-button" id="logoutBtn" type="button">重新输入口令</button>
            </div>
          </header>

          <div class="layout">
            <aside class="sidebar">
              <section class="panel">
                <h2>题库</h2>
                <select id="bankSelect"></select>
                <div class="mode-grid" aria-label="刷题模式">
                  <button class="mode-button active" data-mode="practice" type="button">顺序刷题</button>
                  <button class="mode-button" data-mode="wrong" type="button">错题集</button>
                </div>
                <div class="type-filter" aria-label="题型筛选">
                  <div class="type-filter-head">
                    <span>题型</span>
                    <button class="text-button" id="selectAllTypesBtn" type="button">全选</button>
                  </div>
                  <label class="type-check">
                    <input type="checkbox" data-type-filter="choice" checked />
                    <span>选择题</span>
                    <small data-type-count="choice">0</small>
                  </label>
                  <label class="type-check">
                    <input type="checkbox" data-type-filter="judge" checked />
                    <span>判断题</span>
                    <small data-type-count="judge">0</small>
                  </label>
                  <label class="type-check">
                    <input type="checkbox" data-type-filter="blank" checked />
                    <span>填空题</span>
                    <small data-type-count="blank">0</small>
                  </label>
                  <label class="type-check">
                    <input type="checkbox" data-type-filter="essay" checked />
                    <span>问答题</span>
                    <small data-type-count="essay">0</small>
                  </label>
                </div>
                <button class="primary-button full" id="startBtn" type="button">开始</button>
              </section>

              <section class="panel stats-panel">
                <h2>本轮进度</h2>
                <div class="stat-row"><span>题量</span><strong id="statTotal">0</strong></div>
                <div class="stat-row"><span>已答</span><strong id="statDone">0</strong></div>
                <div class="stat-row"><span>正确</span><strong id="statRight">0</strong></div>
                <div class="progress-track"><div id="progressBar"></div></div>
              </section>

              <section class="panel stats-panel">
                <h2>本机数据</h2>
                <div class="stat-row"><span>错题数</span><strong id="wrongTotal">0</strong></div>
                <button class="secondary-button full" id="clearWrongBtn" type="button">清空当前题库错题</button>
              </section>
            </aside>

            <section class="question-area">
              <div class="empty-state" id="emptyState">
                <h2>选择一个题库开始刷题</h2>
                <p>题库来自当前网页中的 TXT 文件，错题集会自动保存在本机浏览器里。</p>
              </div>

              <article class="question-card hidden" id="questionCard">
                <div class="question-meta">
                  <span id="typeBadge"></span>
                  <span id="questionCounter"></span>
                </div>
                <h2 id="questionText"></h2>
                <div class="options" id="optionsBox"></div>
                <textarea class="essay-box hidden" id="essayAnswer" placeholder="问答题可先写自己的答案，再提交对照参考答案。"></textarea>
                <div class="actions">
                  <button class="primary-button" id="submitBtn" type="button">提交答案</button>
                  <button class="secondary-button hidden" id="nextBtn" type="button">下一题</button>
                </div>
                <div class="result hidden" id="resultBox"></div>
              </article>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
